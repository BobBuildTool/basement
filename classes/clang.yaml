buildVars: [USE_CLANG, TOOLCHAIN_SYSROOT, CC, CLANG_TARGET]
buildTools:
   - target-toolchain
   - name: clang
     if: "${BASEMENT_HAS_CLANG:-false}"
buildVars: [BASEMENT_HAS_CLANG]
buildSetup: |
   if ${BASEMENT_HAS_CLANG:-false} && [[ ${USE_CLANG:-0} == 1 ]]; then
      export CLANG_TARGET_TOOLCHAIN=${BOB_TOOL_PATHS[target-toolchain]}
      export CLANG_GCC_INSTALL_DIR="$($CC -print-search-dirs  | grep  "install:" | cut -d ' ' -f 2)"
      export CC="bob_clang"
      export CXX="bob_clang++"
   fi
