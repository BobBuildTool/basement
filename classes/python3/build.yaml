inherit: ["basement::bits::python3-pkg"]

depends:
    - python::build
    - python::installer

buildSetup: |
    python3Build () {
        # parse arguments
        OPTIND=1
        local opt
        local ARGS=()
        while getopts "w" opt ; do
            case "$opt" in
                w)
                    ARGS+=("--wheel")
                    ;;
                \?)
                  echo "Invalid option: -$OPTARG" >&2
                  exit 1
                  ;;
            esac
        done
        shift $(( OPTIND -1 ))

        rm -rf build install && mkdir -p build install
        pushd build
        rsync -a --delete $1/ .
        python3 -m build -n ${ARGS[@]} .
        python3 -m installer dist/*.whl --prefix ../install/usr/
        popd
    }
