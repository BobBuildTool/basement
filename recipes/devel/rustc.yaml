inherit: [install]

metaEnvironment:
    PKG_VERSION: "1.81.0"
    PKG_LICENSE: "Apache-2.0 or MIT"

multiPackage:
    # rust compiler + std lib + tools like cargo
    "":
        # provide the rustc package based on the selected target architecture
        depends:
            - "devel::rustc-$(get-tool-env,target-toolchain,ARCH)"
        provideDeps: [ "devel::rustc-*" ]

    # private convenient helper for downloading/installing a variant
    _rustc: &_rustc
        checkoutSCM:
            scm: url
            url: ${RUST_MIRROR}/dist/rust-${PKG_VERSION}-${RUST_ARCH}.tar.xz
            digestSHA1: ${RUST_SHA1}
            stripComponents: 1
        # we need the target toolchain in order to get the correct target ARCH
        buildTools: [target-toolchain]
        buildVars: [RUST_ARCH]
        buildScript: |
            $1/install.sh --destdir=$PWD/install \
                --prefix=/usr \
                --disable-ldconfig \
                --components=rustc,cargo,rust-std-$RUST_ARCH

        packageScript: |
            installCopy "$1/install/"

    x86_64:
        privateEnvironment:
            RUST_ARCH: x86_64-unknown-linux-gnu
            RUST_SHA1: 8cce2d23c08988975646dab34b812c6315cb1f4f
        multiPackage:
            "": *_rustc

    i386:
        privateEnvironment:
            RUST_ARCH: i686-unknown-linux-gnu
            RUST_SHA1: 24b9c438adcaaa7ad1ce88b4c7bf9a256971fbb6
        multiPackage:
            "": *_rustc

    arm64:
        privateEnvironment:
            RUST_ARCH: aarch64-unknown-linux-gnu
            RUST_SHA1: 685a6f96c8d3e57409a13ea0ed54c28296a26532
        multiPackage:
            "": *_rustc

    arm:
        privateEnvironment:
            RUST_ARCH: armv7-unknown-linux-gnueabihf
            RUST_SHA1: 9d2e65af2cd34271ad9faea467cbc92ab28131f5
        multiPackage:
            "": *_rustc

    # extra rust std lib used for cross compiling

    # private convenient helper for downloading/installing a variant
    _std: &_std
        checkoutSCM:
            scm: url
            url: ${RUST_MIRROR}/dist/rust-std-${PKG_VERSION}-${RUST_STD_ARCH}.tar.xz
            digestSHA1: ${RUST_STD_SHA1}
            stripComponents: 1
        buildScript: |
            $1/install.sh --destdir=$PWD/install \
            --prefix=/usr \
            --disable-ldconfig
        packageScript: |
            # we have to use copy, because there are cross libs
            installCopy "$1/install/"

    std-x86_64:
        privateEnvironment:
            RUST_STD_ARCH: x86_64-unknown-linux-gnu
            RUST_STD_SHA1: 2b76cdd61dfd713cc3486820be6f96be610cdb70
        multiPackage:
            "": *_std

    std-i386:
        privateEnvironment:
            RUST_STD_ARCH: i686-unknown-linux-gnu
            RUST_STD_SHA1: 998427cf24cc4a21a95e61bcd9514888b050d2d5
        multiPackage:
            "": *_std

    std-arm64:
        privateEnvironment:
            RUST_STD_ARCH: aarch64-unknown-linux-gnu
            RUST_STD_SHA1: c23fd4068df568b89d5998c1ac9fe565eeb01d97
        multiPackage:
            "": *_std

    std-arm:
        privateEnvironment:
            RUST_STD_ARCH: armv7-unknown-linux-gnueabihf
            RUST_STD_SHA1: 1a78588e07aca1f96c60a0ef4ecad598a2ba58d6
        multiPackage:
            "": *_std

    # rust compiler + cross std lib as tool

    # private convenient helper for downloading/installing a variant
    # the cross variants install an additional std lib for the specified target
    # and also provide everything as an tool for use while building
    _cross: &_cross
        depends:
            - devel::rustc
            - devel::rustc-std-${RUST_CROSS_STD}
        buildVars: [ARCH, RUST_CROSS_STD]
        buildScript: |
            # copy both deps into this package, because for tools we don't
            # really have deps tracking
            rsync -auHK \
                ${BOB_DEP_PATHS[devel::rustc-${ARCH}]}/ \
                ${BOB_DEP_PATHS[devel::rustc-std-${RUST_CROSS_STD}]}/ \
                $PWD/install
        packageScript: |
            # we have to use copy, because there are cross libs
            installCopy "$1/install/"
        provideTools:
            rustc: "usr/bin"

    cross-x86_64:
        environment:
            RUST_CROSS_STD: x86_64
        multiPackage:
            "": *_cross

    cross-i386:
        environment:
            RUST_CROSS_STD: i386
        multiPackage:
            "": *_cross

    cross-arm64:
        environment:
            RUST_CROSS_STD: arm64
        multiPackage:
            "": *_cross

    cross-arm:
        environment:
            RUST_CROSS_STD: arm
        multiPackage:
            "": *_cross
