inherit: [autotools]

metaEnvironment:
    PKG_LICENSE: "GPL-3.0-or-later"
    PKG_VERSION: "5.4.0"

depends:
    - libs::mpfr-dev
    - use: []
      depends:
          - libs::mpfr-tgt

checkoutSCM:
    scm: url
    url: ${GNU_MIRROR}/gawk/gawk-${PKG_VERSION}.tar.xz
    digestSHA1: "f13452fb3260f4959dcdb62d78b6236506ec8d14"
    stripComponents: 1

buildScript: |
    autotoolsBuild $1

packageScript: |
    autotoolsPackageTgt

provideDeps: [ "*-tgt" ]
